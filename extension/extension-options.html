<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="extension.css" />
    <title>知识检索扩展设置</title>
  </head>
  <body>
    <main class="options-shell">
      <section class="panel stack">
        <div>
          <h1>扩展设置</h1>
          <p>配置扩展连接的知识检索后端。默认使用本机服务。</p>
        </div>
        <form class="stack" id="settingsForm">
          <label>
            API 地址
            <input id="apiBaseInput" name="apiBase" placeholder="http://localhost:5173/api" autocomplete="off" />
          </label>
          <div class="actions">
            <button class="primary" type="submit">保存</button>
            <button id="resetDefault" type="button">恢复默认</button>
            <button id="testApi" type="button">测试连接</button>
            <button id="openApp" type="button">打开知识库</button>
          </div>
          <p class="status" id="status"></p>
        </form>
      </section>
    </main>
    <script src="extension-options.js"></script>
  </body>
</html>
